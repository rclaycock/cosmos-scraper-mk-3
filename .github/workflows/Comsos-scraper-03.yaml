name: Cosmos Gallery 03

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: cosmos-scraper-mk-3-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      COSMOS_FEED_BASE_URL: https://rclaycock.github.io/cosmos-scraper-mk-3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate feeds
        run: npm run scrape

      - name: Pack Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory public \
            --exclude=.git \
            --exclude=.github \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
